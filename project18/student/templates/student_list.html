<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Student Data </title>
</head>
<body>
    <h2>All Student Data</h2>
    <a href="{% url 'student_create' %}">Add New Student</a>
    <ul> 
        {% for student in students %}
            <li>
                <a href="{% url 'student_detail' student.id %}">{{ student.name }}</a>
                <a href="{% url 'student_edit' student.id %}">Edit</a>
                <a href="{% url 'student_delete' student.id %}"> Delete </a>
            </li>
        {% endfor %}
    </ul>
    
</body>
</html>
